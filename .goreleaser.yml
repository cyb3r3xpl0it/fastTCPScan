version: 2

project_name: fastTCPScan

before:
  hooks:
    - go mod tidy

builds:
  - id: fastTCPScan
    main: .
    binary: fastTCPScan
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

# SBOM (Software Bill of Materials) por cada archivo; requiere syft en el PATH.
sboms:
  - artifacts: archive

# Firma keyless de los checksums con cosign (Sigstore, requiere OIDC en CI).
signs:
  - cmd: cosign
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--output-certificate=${certificate}'
      - '--output-signature=${signature}'
      - '${artifact}'
      - '--yes'
    artifacts: checksum
    output: true

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

release:
  github:
    owner: cyb3r3xpl0it
    name: fastTCPScan
